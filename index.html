<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>äway | ANQ 14.0</title>
    <style>
        :root { --bg: #050505; }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background-color: var(--bg);
            color: #ffffff; 
            font-family: "Didot", "Playfair Display", serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #quantum-wrap { text-align: center; cursor: pointer; width: 90%; margin-top: -60px; }

        #readout {
            display: flex;
            justify-content: center;
            align-items: baseline;
            font-size: clamp(8rem, 35vw, 22rem);
            font-weight: 400;
            line-height: 0.9;
            letter-spacing: 10px; 
            margin-bottom: 20px; 
        }

        .dot { font-size: 0.4em; margin: 0 15px; opacity: 0.9; }

        #quantities {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 20%;
            font-family: "Arial", sans-serif;
            font-weight: bold;
            font-size: 0.65rem; 
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 80px; 
        }

        #track-container { width: 85vw; max-width: 700px; margin: 0 auto; position: relative; }
        #track { width: 100%; height: 2px; background: #1a1a1a; position: relative; }
        #fill {
            height: 500%; top: -4px; width: 0%; position: absolute;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            transition: background-color 1.5s ease, width 1s linear;
        }

        #bar-metrics {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #footer {
            position: absolute; bottom: 50px; width: 100%;
            text-align: center; font-family: "Didot", serif;
            font-size: 1.1rem; color: #444; 
        }
    </style>
</head>
<body onclick="toggleChaos()">

    <div id="quantum-wrap">
        <div id="readout">
            <span id="u">00</span><span class="dot">.</span>
            <span id="p">0</span>
        </div>
        <div id="quantities">
            <span>UNIT</span>
            <span>PULSE</span>
        </div>
        <div id="track-container">
            <div id="track"><div id="fill"></div></div>
            <div id="bar-metrics">
                <span id="degree-status">SHADOW : ABYSS</span>
                <span id="perc-display">0%</span>
            </div>
        </div>
    </div>

    <div id="footer">Houston : CST : <span id="false-time">00:00</span></div>

    <script>
        let isChaos = false;

        function getStatus(unit, pulse) {
            let totalVal = unit + (pulse / 10);
            if (totalVal < 3.5) return "SHADOW : THE ABYSS";
            if (totalVal < 7.0) return "SHADOW : THE SHORELINE";
            if (totalVal < 10.5) return "LIGHT : THE FLARE";
            return "LIGHT : THE DESCENT";
        }

        function update() {
            const now = new Date();
            let start = new Date();
            start.setHours(1, 40, 0, 0); 
            if (now < start) start.setDate(start.getDate() - 1);

            let elapsed = now - start;
            let totalSubs = (elapsed / 86400000) * 1400; // 14 Units * 10 Pulse * 10 Sub
            
            let currentPulse = Math.floor((totalSubs / 10) % 10);
            let currentUnit = Math.floor(totalSubs / 100);

            document.getElementById('u').innerText = currentUnit.toString().padStart(2, '0');
            document.getElementById('p').innerText = currentPulse;
            document.getElementById('degree-status').innerText = `${currentUnit}° ${getStatus(currentUnit, currentPulse)}`;
            
            let pct = ((totalSubs / 100) / 14) * 100;
            document.getElementById('fill').style.width = pct + "%";
            document.getElementById('perc-display').innerText = Math.floor(pct) + "%";
            document.getElementById('false-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            if (isChaos) {
                const unitHue = (currentUnit * 25.7) % 360;
                document.getElementById('fill').style.backgroundColor = `hsl(${unitHue}, 100%, 65%)`;
                document.getElementById('degree-status').style.color = `hsl(${unitHue}, 100%, 65%)`;
            } else {
                document.getElementById('fill').style.backgroundColor = "#ffffff";
                document.getElementById('degree-status').style.color = "#ffffff";
            }
        }

        function toggleChaos() { isChaos = !isChaos; update(); }
        setInterval(update, 1000);
        update();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
  </html>
