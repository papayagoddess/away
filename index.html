<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>äway</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #000000; }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-transform: lowercase;
            letter-spacing: 0.15em; overflow: hidden;
        }
        .viewport-lock {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; width: 100%; max-width: 400px;
            text-align: center; padding: 20px;
        }
        #weather-status { font-size: 0.7rem; margin-bottom: 5rem; letter-spacing: 0.3em; font-weight: 500; }
        #local-degree { font-size: 4.5rem; font-weight: 200; line-height: 0.9; margin-bottom: 0.5rem; }
        #universal-degree { font-size: 1rem; font-weight: 400; opacity: 0.3; }
        .label { font-size: 0.6rem; opacity: 0.3; margin-top: 8px; font-style: italic; }
        .divider { width: 25px; height: 1px; background: #000; margin: 35px auto; }
        #connection-info { position: fixed; bottom: 40px; font-size: 0.55rem; opacity: 0.2; letter-spacing: 0.4em; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="viewport-lock">
        <div id="weather-status">searching environment...</div>
        <div id="local-degree">0.0000°</div>
        <div class="label">local solar position</div>
        <div class="divider"></div>
        <div id="universal-degree">0.0000° u</div>
        <div class="label">universal heartbeat</div>
    </div>
    <div id="connection-info">status: connected</div>

    <script>
        let userLon = null, userLat = null;

        // Service Worker & Notification Request
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                Notification.requestPermission();
                setInterval(() => {
                    if (reg.active) {
                        reg.active.postMessage({
                            type: 'TICK',
                            degree: document.getElementById('local-degree').textContent,
                            weather: document.getElementById('weather-status').textContent
                        });
                    }
                }, 5000); // Updates notification every 5 seconds to save battery
            });
        }

        function updateStatus() {
            const statusEl = document.getElementById('connection-info');
            statusEl.textContent = navigator.onLine ? "status: connected" : "ethereal - null";
        }

        async function fetchWeather(lat, lon) {
            if (!navigator.onLine) return;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit`);
                const data = await res.json();
                const desc = data.current_weather.weathercode <= 3 ? "clear skies" : "active atmosphere";
                document.getElementById('weather-status').textContent = `${Math.round(data.current_weather.temperature)}°f — ${desc}`;
            } catch (e) { document.getElementById('weather-status').textContent = "env: unavailable"; }
        }

        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude; userLon = pos.coords.longitude;
            fetchWeather(userLat, userLon);
        });

        function tick() {
            const now = new Date();
            const utcSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds() + (now.getUTCMilliseconds() / 1000);
            const uDeg = (utcSec / 86400) * 360;
            const lDeg = userLon !== null ? (uDeg + userLon + 360) % 360 : ( ( (now.getHours()*3600)+(now.getMinutes()*60)+now.getSeconds() ) / 86400 * 360 );

            document.getElementById('local-degree').textContent = lDeg.toFixed(4) + "°";
            document.getElementById('universal-degree').textContent = uDeg.toFixed(4) + "° u";
            updateStatus();
        }

        setInterval(tick, 50);
        setInterval(() => { if(userLat) fetchWeather(userLat, userLon) }, 600000);
        window.addEventListener('online', updateStatus); window.addEventListener('offline', updateStatus);
    </script>
</body>
</html>
