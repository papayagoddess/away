<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>äway</title>
    <style>
        :root { --bg-color: #ffffff; --text-color: #000000; }
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-transform: lowercase;
            letter-spacing: 0.15em; overflow: hidden;
        }
        .viewport-lock {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; width: 100%; max-width: 400px;
            text-align: center; padding: 20px;
        }

        .env-block { font-size: 0.7rem; letter-spacing: 0.3em; font-weight: 400; margin-bottom: 5rem; }
        #celestial-trigger { cursor: pointer; display: block; margin-bottom: 0.8rem; }
        #weather-status { cursor: pointer; display: block; }

        #local-degree { font-size: 4.5rem; font-weight: 200; line-height: 0.9; margin-bottom: 0.5rem; }
        #universal-degree { font-size: 1rem; font-weight: 400; opacity: 0.3; }
        .label { font-size: 0.6rem; opacity: 0.3; margin-top: 8px; font-style: italic; }
        .divider { width: 25px; height: 1px; background: #000; margin: 35px auto; }
        
        .overlay {
            position: fixed; top: 10%; left: 5%; width: 90%; height: 80%;
            background: #ffffff; display: none; flex-direction: column; align-items: center; z-index: 100;
            border: 1px solid #000; box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }
        .scroll-area { width: 100%; overflow-y: auto; display: flex; flex-direction: column; align-items: center; -webkit-overflow-scrolling: touch; }
        .close-btn { width: 100%; padding: 15px 0; text-align: center; font-size: 0.6rem; border-bottom: 1px solid #000; background: #fff; position: sticky; top: 0; z-index: 101; cursor: pointer; }

        .month-nav { display: flex; align-items: center; gap: 30px; margin-top: 35px; }
        .nav-arrow { cursor: pointer; font-size: 0.8rem; opacity: 0.3; padding: 10px; }
        #month-header { font-size: 0.65rem; letter-spacing: 0.4em; font-weight: 600; }
        
        #celestial-meta { font-size: 0.55rem; opacity: 0.4; font-style: italic; margin-top: 8px; letter-spacing: 0.2em; margin-bottom: 10px; }
        #calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 20px 15px; padding: 30px 20px; width: 85%; text-align: center; }
        .cal-day { font-size: 0.8rem; opacity: 0.4; font-weight: 300; }
        .cal-day.today { opacity: 1; font-weight: 900; }

        #holiday-list, #forecast-list { width: 85%; padding-bottom: 40px; }
        #holiday-list { border-top: 1px solid #eee; padding-top: 20px; }
        .holiday-group { margin-bottom: 25px; text-align: left; }
        .holiday-season { font-size: 0.55rem; font-weight: 800; opacity: 0.3; margin-bottom: 10px; letter-spacing: 0.3em; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .holiday-item { display: flex; justify-content: space-between; font-size: 0.65rem; margin-bottom: 8px; }
        .holiday-date { font-weight: 200; width: 95px; }

        .zodiac-item { color: #000; opacity: 1; font-weight: 400; margin-top: 15px; }
        .forecast-row { width: 100%; display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid #f2f2f2; font-size: 0.65rem; }
    </style>
</head>
<body>

    <div id="calendar-overlay" class="overlay">
        <div class="close-btn" onclick="toggleOverlay('calendar-overlay')">close</div>
        <div class="scroll-area">
            <div class="month-nav">
                <span class="nav-arrow" onclick="changeMonth(-1)">&lt;</span>
                <div id="month-header"></div>
                <span class="nav-arrow" onclick="changeMonth(1)">&gt;</span>
            </div>
            <div id="celestial-meta"></div>
            <div id="calendar-grid"></div>
            <div id="holiday-list"></div>
        </div>
    </div>

    <div id="forecast-overlay" class="overlay">
        <div class="close-btn" onclick="toggleOverlay('forecast-overlay')">close</div>
        <div id="forecast-list" class="scroll-area"></div>
    </div>

    <div class="viewport-lock">
        <div class="env-block">
            <div id="celestial-trigger" onclick="toggleOverlay('calendar-overlay')">
                <span id="standard-date"></span>
            </div>
            <div id="weather-status" onclick="toggleOverlay('forecast-overlay')">loading...</div>
        </div>
        <div id="local-degree">0.0000°</div>
        <div class="label">local solar position</div>
        <div class="divider"></div>
        <div id="universal-degree">0.0000° u</div>
        <div class="label">universal heartbeat</div>
    </div>

    <script>
        let userLon = null, userLat = null;
        let viewDate = new Date();

        const seasonalHolidays = {
            phis: [{ season: "out of time", items: [{m: "phïs", d: "01", n: "first day of month out of time"}, {m: "phïs", d: "28", n: "end of month out of time"}] }],
            spring: [
                { season: "early spring", items: [{m: "feb", d: "01", n: "first day of spring"}, {m: "feb", d: "02", n: "groundhogs day"}, {m: "feb", d: "14-16", n: "lupercalia"}] },
                { season: "mid spring", items: [{m: "mar", d: "19", n: "equinox eve"}, {m: "mar", d: "20", n: "spring equinox"}] },
                { season: "late spring", items: [{m: "apr", d: "01", n: "fools day"}] }
            ],
            summer: [
                { season: "early summer", items: [{m: "may", d: "01", n: "first day of summer"}] },
                { season: "mid summer", items: [{m: "jun", d: "20", n: "solstice eve"}, {m: "jun", d: "21", n: "summer solstice"}] }
            ],
            autumn: [
                { season: "early autumn", items: [{m: "aug", d: "01", n: "first day of autumn"}, {m: "sep", d: "20", n: "equinox eve"}, {m: "sep", d: "21", n: "autumn equinox"}] },
                { season: "late autumn", items: [{m: "oct", d: "27", n: "hallo's eve"}, {m: "oct", d: "28", n: "halloween"}] }
            ],
            winter: [
                { season: "early winter", items: [{m: "nov", d: "01", n: "first day of winter"}, {m: "nov", d: "20", n: "harvest day"}] },
                { season: "mid winter", items: [{m: "dec", d: "21", n: "winter solstice"}] }
            ]
        };

        const zodiacRanges = [
            { name: "sagittarius", range: "dec 18 - jan 18" },
            { name: "capricorn", range: "jan 19 - feb 15" },
            { name: "aquarius", range: "feb 16 - mar 11" },
            { name: "pisces", range: "mar 12 - apr 18" },
            { name: "aries", range: "apr 19 - may 13" },
            { name: "taurus", range: "may 14 - jun 19" },
            { name: "gemini", range: "jun 20 - jul 20" },
            { name: "cancer", range: "jul 21 - aug 09" },
            { name: "leo", range: "aug 10 - sep 15" },
            { name: "virgo", range: "sep 16 - oct 30" },
            { name: "libra", range: "oct 31 - nov 22" },
            { name: "scorpius", range: "nov 23 - nov 29" },
            { name: "ophiuchus", range: "nov 30 - dec 17" }
        ];

        const getZodiac = (m, d) => {
            if (m === 0) return (d <= 19) ? "sagittarius" : "capricorn";
            if (m === 1) return (d <= 15) ? "capricorn" : "aquarius";
            if (m === 2) return (d <= 11) ? "aquarius" : "pisces";
            if (m === 3) return (d <= 18) ? "pisces" : "aries";
            if (m === 4) return (d <= 13) ? "aries" : "taurus";
            if (m === 5) return (d <= 20) ? "taurus" : "gemini";
            if (m === 6) return (d <= 20) ? "gemini" : "cancer";
            if (m === 7) return (d <= 10) ? "cancer" : "leo";
            if (m === 8) return (d <= 16) ? "leo" : "virgo";
            if (m === 9) return (d <= 30) ? "virgo" : "libra";
            if (m === 10) return (d <= 22) ? "libra" : "scorpius";
            if (m === 11) {
                if (d <= 1) return "scorpius";
                if (d <= 18) return "ophiuchus";
                return "sagittarius";
            }
            return "cosmic";
        };

        const interpretCode = (code) => {
            if (code <= 1) return "clear";
            if (code <= 3) return "cloudy";
            if (code <= 48) return "fog";
            if (code <= 67) return "rain";
            return "active";
        };

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
            if(id === 'calendar-overlay') renderLunarCalendar();
        }

        function changeMonth(dir) {
            viewDate.setMonth(viewDate.getMonth() + dir);
            renderLunarCalendar();
        }

        function renderLunarCalendar() {
            const now = new Date();
            const monthIdx = viewDate.getMonth();
            const dayOfMonth = viewDate.getDate();
            
            let monthName = viewDate.toLocaleString('en-US', { month: 'long' }).toLowerCase();
            if (monthIdx === 0) monthName = "phïs"; 
            document.getElementById('month-header').textContent = monthName;

            const dayOfYear = Math.floor((viewDate - new Date(viewDate.getFullYear(), 0, 0)) / 86400000);
            const lunarDay = ((dayOfYear - 1) % 28) + 1;
            const phases = ["●","☽","◑","🌔","○","🌖","◐","☾"];
            const phaseNames = ["new moon","waxing crescent","first quarter","waxing gibbous","full moon","waning gibbous","third quarter","waning crescent"];
            let pIdx = (lunarDay === 1) ? 0 : (lunarDay < 7) ? 1 : (lunarDay === 7) ? 2 : (lunarDay < 14) ? 3 : (lunarDay === 14) ? 4 : (lunarDay < 21) ? 5 : (lunarDay === 21) ? 6 : 7;

            const seasons = ["month out of time", "early spring", "mid spring", "late spring", "early summer", "mid summer", "late summer", "early autumn", "mid autumn", "late autumn", "early winter", "mid winter"];
            
            const zodiac = getZodiac(monthIdx, dayOfMonth);
            document.getElementById('celestial-meta').textContent = `${seasons[monthIdx]} // ${zodiac} // ${phaseNames[pIdx]} ${phases[pIdx]}`;

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            for (let i = 1; i <= 28; i++) {
                const day = document.createElement('div');
                day.className = 'cal-day';
                if (viewDate.getMonth() === now.getMonth() && i === ((Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000) - 1) % 28) + 1) day.classList.add('today');
                day.textContent = i.toString().padStart(2, '0');
                grid.appendChild(day);
            }

            const hList = document.getElementById('holiday-list');
            hList.innerHTML = "";
            let activeSet = (monthIdx === 0) ? seasonalHolidays.phis : (monthIdx >= 1 && monthIdx <= 3) ? seasonalHolidays.spring : (monthIdx >= 4 && monthIdx <= 6) ? seasonalHolidays.summer : (monthIdx >= 7 && monthIdx <= 9) ? seasonalHolidays.autumn : seasonalHolidays.winter;

            activeSet.forEach(s => {
                let html = `<div class="holiday-group"><div class="holiday-season">${s.season}</div>`;
                s.items.forEach(item => {
                    html += `<div class="holiday-item"><span class="holiday-date">${item.m} ${item.d}</span> <span>${item.n}</span></div>`;
                });
                hList.innerHTML += html + `</div>`;
            });

            // Append Zodiac list to the end of the seasonal block
            let zodiacHtml = `<div class="holiday-group" style="margin-top: 20px; border-top: 1px solid #f2f2f2; padding-top: 20px;"><div class="holiday-season">celestial alignment</div>`;
            zodiacRanges.forEach(z => {
                const isActive = zodiac === z.name ? 'zodiac-item' : '';
                zodiacHtml += `<div class="holiday-item ${isActive}"><span class="holiday-date">${z.range}</span> <span>${z.name}</span></div>`;
            });
            hList.innerHTML += zodiacHtml + `</div>`;
        }

        async function fetchEnv(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&temperature_unit=fahrenheit&timezone=auto&forecast_days=16`);
                const data = await res.json();
                document.getElementById('weather-status').textContent = `${Math.round(data.daily.temperature_2m_max[0])}°f — ${interpretCode(data.daily.weathercode[0])}`;
                const list = document.getElementById('forecast-list');
                list.innerHTML = "";
                data.daily.time.forEach((date, i) => {
                    const row = document.createElement('div');
                    row.className = 'forecast-row';
                    const label = new Date(date + 'T00:00:00').toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'}).toLowerCase();
                    row.innerHTML = `<span>${label}</span><span style="opacity:0.4;">${interpretCode(data.daily.weathercode[i])}</span><span>${Math.round(data.daily.temperature_2m_max[i])}° | ${Math.round(data.daily.temperature_2m_min[i])}°</span>`;
                    list.appendChild(row);
                });
            } catch (e) { document.getElementById('weather-status').textContent = "env: offline"; }
        }

        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude; userLon = pos.coords.longitude;
            fetchEnv(userLat, userLon);
        });

        function tick() {
            const now = new Date();
            let labelDate = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', weekday: 'long' }).toLowerCase();
            if (now.getMonth() === 0) labelDate = labelDate.replace("january", "phïs");
            document.getElementById('standard-date').textContent = labelDate;

            const utcSec = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
            const uDeg = (utcSec / 86400) * 360;
            const lDeg = userLon !== null ? (uDeg + userLon + 360) % 360 : uDeg;
            document.getElementById('local-degree').textContent = lDeg.toFixed(4) + "°";
            document.getElementById('universal-degree').textContent = uDeg.toFixed(4) + "° u";
        }
        setInterval(tick, 50);
    </script>
</body>
</html>
